<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exea | BitGuardoX Control Surface</title>
  <style>
    :root {
      --bg: #050812;
      --bg-2: #0a1020;
      --panel: #11182a;
      --edge: #233252;
      --txt: #dce8ff;
      --muted: #90a3c8;
      --good: #11d192;
      --warn: #f4be43;
      --bad: #ff5f70;
      --cyan: #38d9ff;
      --violet: #9b8cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif;
      background:
        radial-gradient(900px 420px at 8% -12%, rgba(56,217,255,0.18), transparent 50%),
        radial-gradient(1200px 450px at 92% -30%, rgba(155,140,255,0.2), transparent 53%),
        linear-gradient(180deg, var(--bg), #03060e);
      color: var(--txt);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }
    .brand h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.3px;
    }
    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .status-pill {
      border: 1px solid var(--edge);
      background: #0a1223;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid var(--edge);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(17,24,42,0.95), rgba(9,13,24,0.95));
      padding: 14px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.28);
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 15px;
      letter-spacing: 0.2px;
      color: #ecf3ff;
    }
    .kpi { grid-column: span 3; }
    .kpi .value {
      font-size: 30px;
      font-weight: 700;
      margin-top: 4px;
    }
    .kpi .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .panel-wide { grid-column: span 8; }
    .panel-side { grid-column: span 4; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    button {
      border: 1px solid var(--edge);
      background: #0d1830;
      color: var(--txt);
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { border-color: #33518a; }
    button.good { background: rgba(17,209,146,0.12); border-color: rgba(17,209,146,0.45); }
    button.warn { background: rgba(244,190,67,0.12); border-color: rgba(244,190,67,0.45); }
    button.bad { background: rgba(255,95,112,0.12); border-color: rgba(255,95,112,0.45); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 8px;
    }
    th, td {
      border-bottom: 1px solid rgba(35,50,82,0.7);
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    .chip {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      border: 1px solid;
    }
    .chip.good { color: var(--good); border-color: rgba(17,209,146,0.5); }
    .chip.warn { color: var(--warn); border-color: rgba(244,190,67,0.5); }
    .chip.bad { color: var(--bad); border-color: rgba(255,95,112,0.5); }
    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
    .log {
      height: 370px;
      overflow: auto;
      background: #081126;
      border: 1px solid #1d2b49;
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }
    input {
      width: 100%;
      background: #0b1325;
      color: var(--txt);
      border: 1px solid #1e2f4f;
      border-radius: 8px;
